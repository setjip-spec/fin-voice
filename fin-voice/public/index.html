<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FIN_TABLE Voice</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="title">FIN_TABLE Voice</div>
        <div class="subtitle">Голосовой ввод в ежедневник и мысли</div>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <div class="cardHead">
          <div class="cardTitle">Режим</div>
        </div>

        <div class="segmented">
          <button class="segBtn active" id="btnModeDiary" type="button">Ежедневник</button>
          <button class="segBtn" id="btnModeThought" type="button">Мысли</button>
        </div>

        <div id="diaryForm">
          <div class="row">
            <label>Дата</label>
            <input id="diaryDate" type="date">
          </div>

          <div class="row">
            <label>Категория</label>
            <select id="diaryCategory"></select>
          </div>

          <div class="grid2">
            <div class="row">
              <label>Время</label>
              <input id="diaryTime" type="time">
            </div>

            <div class="row checkboxRow">
              <label class="checkboxLabel">
                <input id="diaryNoTime" type="checkbox">
                <span>Без времени</span>
              </label>
            </div>
          </div>
        </div>

        <div id="thoughtForm" style="display:none;">
          <div class="row">
            <label>Категория</label>
            <select id="thoughtCategory"></select>
          </div>

          <div class="row">
            <label>Заголовок</label>
            <input id="thoughtTitle" type="text" placeholder="Например: Идея по инвестициям">
          </div>
        </div>

        <div class="row">
          <label>Текст</label>
          <textarea id="voiceText" rows="8" placeholder="Здесь появится распознанный текст"></textarea>
        </div>

        <div class="btnRow">
          <button class="btn primary" id="btnRecord" type="button">🎤 Начать запись</button>
          <button class="btn" id="btnStop" type="button" disabled>■ Остановить</button>
          <button class="btn" id="btnClear" type="button">Очистить</button>
        </div>

        <div class="status" id="statusBox">Готово</div>

        <div class="btnRow">
          <button class="btn success" id="btnSave" type="button">Сохранить в FIN_TABLE</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
